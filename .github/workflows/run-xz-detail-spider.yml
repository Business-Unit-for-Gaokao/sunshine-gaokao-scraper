name: Run XZ Detail Spider Full

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: xz-detail-spider
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  HEADLESS: "true"
  XZ_MAX_DETAILS: "0"
  XZ_MAX_PAGES: "200"
  XZ_LIST_STEP: "15"
  XZ_EMPTY_PAGE_STOP: "3"
  XZ_DOWNLOAD_IMAGES: "true"
  XZ_SAVE_HTML: "true"
  XZ_SAVE_LIST_HTML: "true"

jobs:
  run-xz-detail:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Show runtime config
        run: |
          echo "HEADLESS=$HEADLESS"
          echo "XZ_MAX_DETAILS=$XZ_MAX_DETAILS"
          echo "XZ_MAX_PAGES=$XZ_MAX_PAGES"
          echo "XZ_LIST_STEP=$XZ_LIST_STEP"
          echo "XZ_EMPTY_PAGE_STOP=$XZ_EMPTY_PAGE_STOP"
          echo "XZ_DOWNLOAD_IMAGES=$XZ_DOWNLOAD_IMAGES"
          echo "XZ_SAVE_HTML=$XZ_SAVE_HTML"
          echo "XZ_SAVE_LIST_HTML=$XZ_SAVE_LIST_HTML"

      - name: Run xz detail spider
        run: |
          python scripts/xz_detail_spider.py

      - name: Check output
        id: check-output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d output/xz_detail ] && [ "$(find output/xz_detail -type f | wc -l)" -gt 0 ]; then
            echo "has_output=true" >> "$GITHUB_OUTPUT"
            echo "file_count=$(find output/xz_detail -type f | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "has_output=false" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "output/xz_detail not found or empty"
            exit 1
          fi

      - name: Show output tree
        if: always()
        shell: bash
        run: |
          echo "===== output/xz_detail ====="
          find output/xz_detail -maxdepth 5 -type f | sort || true

      - name: Sync outputs into repo
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/xz_detail
          rsync -av --delete output/xz_detail/ data/xz_detail/

      - name: Configure git
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add data/xz_detail/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Full update xz detail output - $(date +%Y-%m-%d\ %H:%M:%S)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xz-detail-output
          path: output/xz_detail/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
