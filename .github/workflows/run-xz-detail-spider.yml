name: Run XZ Detail Spider

on:
  workflow_dispatch:
    inputs:
      max_details:
        description: "最多抓取多少个专业详情，0 表示不限制"
        required: false
        default: "20"
        type: string
      download_images:
        description: "是否下载详情页图表图片"
        required: false
        default: true
        type: boolean
      save_html:
        description: "是否保存页面 HTML"
        required: false
        default: true
        type: boolean
      headless:
        description: "是否无头运行"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-xz-detail:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run xz detail spider
        env:
          XZ_MAX_DETAILS: ${{ inputs.max_details }}
          XZ_DOWNLOAD_IMAGES: ${{ inputs.download_images }}
          XZ_SAVE_HTML: ${{ inputs.save_html }}
          HEADLESS: ${{ inputs.headless }}
        run: |
          echo "XZ_MAX_DETAILS=$XZ_MAX_DETAILS"
          echo "XZ_DOWNLOAD_IMAGES=$XZ_DOWNLOAD_IMAGES"
          echo "XZ_SAVE_HTML=$XZ_SAVE_HTML"
          echo "HEADLESS=$HEADLESS"
          python scripts/xz_detail_spider.py

      - name: Check output
        id: check-output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d output/xz_detail ] && [ "$(find output/xz_detail -type f | wc -l)" -gt 0 ]; then
            echo "has_output=true" >> "$GITHUB_OUTPUT"
            echo "file_count=$(find output/xz_detail -type f | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "has_output=false" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "output/xz_detail not found or empty"
            exit 1
          fi

      - name: Show output tree
        if: always()
        shell: bash
        run: |
          echo "===== output/xz_detail ====="
          find output/xz_detail -maxdepth 5 -type f | sort || true

      - name: Sync outputs into repo
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/xz_detail
          rsync -av --delete output/xz_detail/ data/xz_detail/

      - name: Show synced tree
        if: always()
        shell: bash
        run: |
          echo "===== data/xz_detail ====="
          find data/xz_detail -maxdepth 5 -type f | sort || true

      - name: Configure git
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add data/xz_detail/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update xz detail spider output - $(date +%Y-%m-%d %H:%M:%S)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xz-detail-output
          path: output/xz_detail/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
