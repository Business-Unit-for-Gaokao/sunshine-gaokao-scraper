name: Run XZ Detail Spider

on:
  workflow_dispatch:
    inputs:
      detail_url:
        description: "学职平台专业详情页，例如 https://xz.chsi.com.cn/speciality/detail/ptbk.action?specId=hota9lc5d66i41zx"
        required: true
        type: string

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"
  HEADLESS: "1"

jobs:
  run-xz-detail:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run xz detail spider
        env:
          XZ_DETAIL_URL: ${{ inputs.detail_url }}
        run: |
          python scripts/xz_detail_spider.py "${XZ_DETAIL_URL}"

      - name: Check output
        id: check-output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d output/xz_detail ] && [ "$(find output/xz_detail -type f | wc -l)" -gt 0 ]; then
            echo "has_output=true" >> "$GITHUB_OUTPUT"
            echo "file_count=$(find output/xz_detail -type f | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "has_output=false" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "output/xz_detail not found or empty"
            exit 1
          fi

      - name: Sync outputs into repo
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/xz_detail
          rsync -av --delete output/xz_detail/ data/xz_detail/

      - name: Show synced files
        if: always()
        shell: bash
        run: |
          echo "===== output/xz_detail ====="
          find output/xz_detail -maxdepth 4 -type f | sort || true
          echo
          echo "===== data/xz_detail ====="
          find data/xz_detail -maxdepth 4 -type f | sort || true

      - name: Configure git
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check-output.outputs.has_output == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add data/xz_detail/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update XZ detail spider output - $(date +%Y-%m-%d)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xz-detail-output
          path: output/xz_detail/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
