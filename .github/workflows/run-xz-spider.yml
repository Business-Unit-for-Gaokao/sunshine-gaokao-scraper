name: Run XZ Spider

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-xz:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run xz spider
        run: |
          python scripts/xz_spider.py

      - name: Show outputs
        if: always()
        run: |
          echo "===== output tree ====="
          find output -maxdepth 4 -type f | sort || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xz-spider-output
          path: output/xz/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
